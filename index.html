<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLEAR — Date Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   CLEAR 2.0 Design Tokens
   ═══════════════════════════════════════════════════════════ */
:root {
  --cmg-primary:#138890; --cmg-primary-light:#32a4ac; --cmg-primary-dark:#047880;
  --cmg-primary-bg:#eaf6f7; --cmg-primary-border:#d1edef;
  --cmg-green:#609e5b; --cmg-green-bg:#e8f5e9;
  --cmg-amber:#d97706; --cmg-amber-bg:#fff8e1;
  --cmg-red:#cb3a31; --cmg-red-bg:#ffe7e6;
  --cmg-bg:#f4f4f5; --cmg-bg-alt:#f9f9fa; --cmg-surface:#ffffff;
  --cmg-panel-header:#e4e4e4;
  --cmg-text:#495057; --cmg-text-label:#5f5f5f; --cmg-text-muted:#929292; --cmg-text-dark:#3b3b3b;
  --cmg-border:#dee2e6; --cmg-border-light:#e4e4e4;
  --cmg-shadow:0 2px 10px 0 rgba(0,0,0,.05); --cmg-shadow-md:0 2px 10px 0 rgba(0,0,0,.1);
  --cmg-radius:6px; --cmg-radius-pill:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Open Sans',sans-serif;font-size:12.25px;line-height:1.5;color:var(--cmg-text);background:var(--cmg-bg)}

/* ── Navbar ────────────────────────────────────────────── */
.navbar{position:sticky;top:0;z-index:100;background:var(--cmg-bg-alt);box-shadow:var(--cmg-shadow-md);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.navbar-brand{display:flex;align-items:center;gap:10px}
.navbar-logo{font-size:20px;font-weight:800;color:var(--cmg-primary);letter-spacing:-.5px}
.navbar-divider{width:1px;height:20px;background:var(--cmg-border-light)}
.navbar-title{font-size:13px;font-weight:600;color:var(--cmg-text-label)}
.navbar-actions{display:flex;align-items:center;gap:8px}

/* ── Loan Info Bar ─────────────────────────────────────── */
.loan-bar{background:var(--cmg-surface);border-bottom:1px solid var(--cmg-border-light);padding:10px 20px;display:flex;flex-wrap:wrap;align-items:center;gap:8px 20px}
.loan-number{font-family:'Courier New',monospace;font-size:13px;font-weight:700;color:var(--cmg-primary)}
.loan-detail{font-size:12px;color:var(--cmg-text-label)} .loan-detail strong{color:var(--cmg-text)}
.loan-sep{color:var(--cmg-border-light)}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:var(--cmg-radius-pill);font-size:11px;font-weight:700;background:var(--cmg-primary-bg);color:var(--cmg-primary-dark);border:1px solid var(--cmg-primary-border)}

/* ── Buttons ───────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 15px;border-radius:var(--cmg-radius-pill);font-family:inherit;font-size:12px;font-weight:700;line-height:17px;cursor:pointer;border:none;transition:background .15s,box-shadow .15s}
.btn:focus-visible{outline:none;box-shadow:0 0 0 2px var(--cmg-primary-border)}
.btn-primary{background:var(--cmg-primary-dark);color:#fff} .btn-primary:hover{background:var(--cmg-primary)}
.btn-secondary{background:var(--cmg-primary-bg);color:var(--cmg-primary-dark);border:1px solid var(--cmg-primary-border)} .btn-secondary:hover{background:var(--cmg-primary-border)}
.btn-danger{background:var(--cmg-red-bg);color:var(--cmg-red);border:1px solid #f5c6c6} .btn-danger:hover{background:#fdd}
.btn-ghost{background:transparent;color:var(--cmg-text-muted);padding:6px 8px} .btn-ghost:hover{background:var(--cmg-bg);color:var(--cmg-text)}
.btn-sm{padding:4px 10px;font-size:11px}

/* ── Mode Banner ───────────────────────────────────────── */
.mode-banner{background:var(--cmg-primary);color:#fff;padding:8px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:12px;font-weight:600;display:none}
.mode-banner.visible{display:flex}
.mode-banner .hint{opacity:.8;font-weight:400}

/* ── Stats Row ─────────────────────────────────────────── */
.stats-row{display:flex;gap:12px;padding:12px 20px;flex-wrap:wrap}
.stat-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--cmg-radius-pill);font-size:11px;font-weight:600;background:var(--cmg-surface);border:1px solid var(--cmg-border-light);color:var(--cmg-text-label)}
.stat-dot{width:8px;height:8px;border-radius:50%}
.dot-completed{background:var(--cmg-green)} .dot-today{background:var(--cmg-primary)} .dot-upcoming{background:var(--cmg-amber)} .dot-pending{background:var(--cmg-border)} .dot-expired{background:var(--cmg-red)}

/* ── Layout ────────────────────────────────────────────── */
.app-body{display:flex;min-height:calc(100vh - 140px)}
.main-area{flex:1;padding:0 20px 24px;max-width:1400px;transition:margin-right .3s}
.main-area.with-inventory{margin-right:360px}

/* ── Layout Selector ───────────────────────────────────── */
.controls-bar{padding:12px 20px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:8px}
.controls-left{display:flex;align-items:center;gap:10px}
.controls-right{display:flex;align-items:center;gap:8px}
.layout-select{position:relative}
.layout-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--cmg-surface);border:1px solid var(--cmg-border);border-radius:var(--cmg-radius);font-family:inherit;font-size:12px;font-weight:600;color:var(--cmg-text);cursor:pointer;min-width:180px;justify-content:space-between}
.layout-btn:hover{border-color:var(--cmg-primary-light)}
.layout-btn svg{width:12px;height:12px;color:var(--cmg-text-muted);transition:transform .2s}
.layout-btn.open svg{transform:rotate(180deg)}
.layout-dropdown{position:absolute;top:100%;left:0;margin-top:4px;min-width:260px;background:var(--cmg-surface);border:1px solid var(--cmg-border);border-radius:var(--cmg-radius);box-shadow:var(--cmg-shadow-md);z-index:50;overflow:hidden}
.layout-dropdown-item{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 12px;border:none;background:none;font-family:inherit;font-size:12px;color:var(--cmg-text);cursor:pointer;text-align:left}
.layout-dropdown-item:hover{background:var(--cmg-primary-bg)}
.layout-dropdown-item.active{background:var(--cmg-primary-bg);color:var(--cmg-primary-dark);font-weight:600}
.layout-dropdown-item .del-btn{background:none;border:none;color:var(--cmg-text-muted);cursor:pointer;padding:2px 5px;font-size:14px;line-height:1;border-radius:3px} .layout-dropdown-item .del-btn:hover{color:var(--cmg-red);background:var(--cmg-red-bg)}
.layout-dropdown-divider{height:1px;background:var(--cmg-border-light);margin:2px 0}
.layout-dropdown-item.new-layout{color:var(--cmg-primary);font-weight:600}

/* ── Groups Grid ───────────────────────────────────────── */
.groups-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}
@media(max-width:900px){.groups-grid{grid-template-columns:1fr}}

/* ── Group Panels ──────────────────────────────────────── */
.group-panel{border-radius:var(--cmg-radius);box-shadow:var(--cmg-shadow);overflow:hidden;transition:box-shadow .2s,outline .2s;outline:2px solid transparent;grid-column:span 1}
.group-panel.span-2{grid-column:span 2}
@media(max-width:900px){.group-panel.span-2{grid-column:span 1}}
.group-panel.drag-over-group{outline:2px solid var(--cmg-primary-light);box-shadow:var(--cmg-shadow-md)}
.group-panel.dragging{opacity:.4}
.group-header{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--cmg-panel-header);user-select:none;min-height:36px}
.group-drag-handle{cursor:grab;color:var(--cmg-text-muted);padding:2px 4px;display:none;flex-shrink:0}
.group-drag-handle:active{cursor:grabbing}
.editing .group-drag-handle{display:block}
.group-color-bar{width:4px;height:16px;border-radius:2px;flex-shrink:0}
.group-name{font-size:13px;font-weight:700;color:var(--cmg-text-dark);flex:1;cursor:default;border:none;background:none;font-family:inherit;padding:0}
.editing .group-name{cursor:text;border-bottom:1px dashed var(--cmg-text-muted);padding:0 4px}
.editing .group-name:focus{outline:none;border-bottom-color:var(--cmg-primary)}
.group-count{font-size:11px;font-weight:600;color:var(--cmg-text-muted);padding:2px 8px;background:rgba(0,0,0,.06);border-radius:10px}
.group-actions{display:none;align-items:center;gap:4px}
.editing .group-actions{display:flex}
.group-chevron{transition:transform .2s;color:var(--cmg-text-muted);cursor:pointer;padding:2px}
.group-chevron.collapsed{transform:rotate(-90deg)}
.group-content{background:var(--cmg-surface);padding:14px;min-height:40px;transition:background .15s}
.group-content.collapsed{display:none}
.group-content.drag-target{background:var(--cmg-primary-bg)}
.group-content.empty-target{border:2px dashed var(--cmg-primary-border);background:var(--cmg-primary-bg);display:flex;align-items:center;justify-content:center;min-height:60px;color:var(--cmg-primary);font-weight:600;font-size:12px}

/* ── Drop placeholder between groups ───────────────────── */
.drop-zone{height:4px;margin:2px 0;border-radius:2px;transition:height .15s,background .15s}
.drop-zone.active{height:8px;background:var(--cmg-primary-light)}

/* ── Date Cards ────────────────────────────────────────── */
.date-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px}
.date-card{padding:10px 12px;border:1px solid var(--cmg-border-light);border-radius:4px;border-left:3px solid transparent;transition:box-shadow .15s,opacity .2s,transform .2s;position:relative;cursor:pointer}
.date-card:hover{box-shadow:var(--cmg-shadow-md);transform:translateY(-2px)}
.editing .date-card:hover{box-shadow:var(--cmg-shadow);transform:none}
.date-card.dragging{opacity:.3}
.date-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
.date-card-label{font-size:11px;font-weight:600;color:var(--cmg-text-label);margin-bottom:2px;line-height:1.3}
.date-card-remove{display:none;background:none;border:none;color:var(--cmg-text-muted);cursor:pointer;font-size:13px;line-height:1;padding:0 2px;flex-shrink:0}
.editing .date-card-remove{display:block}
.date-card-remove:hover{color:var(--cmg-red)}
.date-card-value{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.date-card-value.completed{color:var(--cmg-green)} .date-card-value.today{color:var(--cmg-primary)}
.date-card-value.upcoming{color:var(--cmg-amber)} .date-card-value.expired{color:var(--cmg-red)}
.date-card-value.pending{color:var(--cmg-text-muted);font-weight:400;font-style:italic}
.date-status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.date-card-badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.02em;text-transform:uppercase}
.badge-computed{background:#ede9fe;color:#6d28d9} .badge-editable{background:var(--cmg-primary-bg);color:var(--cmg-primary-dark)}
.badge-countdown{background:var(--cmg-amber-bg);color:var(--cmg-amber)}
.badge-countdown.urgent{background:var(--cmg-red-bg);color:var(--cmg-red)}
.editing .date-card{cursor:grab} .editing .date-card:active{cursor:grabbing}

/* ── Drag: Group Drop Zones ──────────────────────────── */
.group-drop-row{grid-column:1/-1;display:none;grid-template-columns:1fr 1fr;gap:10px;padding:2px 0}
.group-dragging .group-drop-row{display:grid}
.group-drop-target{height:56px;border:2.5px dashed rgba(19,136,144,.3);border-radius:10px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:default;transition:all .2s ease;position:relative;overflow:hidden}
.group-drop-target::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(19,136,144,.04) 0%,transparent 70%);opacity:0;transition:opacity .25s}
.group-drop-target.dz-hover{border-color:var(--cmg-primary);border-style:solid;box-shadow:0 0 24px rgba(19,136,144,.18),inset 0 0 24px rgba(19,136,144,.04);transform:scale(1.01)}
.group-drop-target.dz-hover::before{opacity:1}
.group-drop-target .dz-icon{color:rgba(19,136,144,.4);transition:color .2s}
.group-drop-target.dz-hover .dz-icon{color:var(--cmg-primary)}
.group-drop-target .dz-label{font-size:11px;font-weight:700;color:rgba(19,136,144,.4);transition:color .2s;letter-spacing:.03em}
.group-drop-target.dz-hover .dz-label{color:var(--cmg-primary)}
.group-drop-target .dz-sub{font-size:9px;color:rgba(19,136,144,.3);transition:color .2s}
.group-drop-target.dz-hover .dz-sub{color:rgba(19,136,144,.6)}

/* ── Drag: Group states during drag ──────────────────── */
.group-dragging .group-panel{opacity:.45;transform:scale(.985);transition:opacity .25s,transform .25s}
.group-dragging .group-panel.dragging{opacity:.12;transform:scale(.97)}
.group-dragging .group-panel.drag-over-group{opacity:.7;outline:2px solid var(--cmg-primary-light);transform:scale(1)}

/* ── Drag: Date receiving states ─────────────────────── */
.date-receiving .group-panel{outline:2px dashed rgba(19,136,144,.25);outline-offset:2px;transition:outline-color .2s,box-shadow .2s}
.date-receiving .group-panel.date-target{outline-color:var(--cmg-primary);outline-style:solid;box-shadow:0 0 20px rgba(19,136,144,.12)}
.date-receiving .group-content.drag-target{background:rgba(19,136,144,.06);box-shadow:inset 0 0 16px rgba(19,136,144,.06)}
.date-receiving .group-content.empty-target{border-color:var(--cmg-primary);background:rgba(19,136,144,.08)}

/* ── Drag: Date reorder indicators ───────────────────── */
.editing .date-card.drop-before{box-shadow:0 -2.5px 0 0 var(--cmg-primary)!important;z-index:2;position:relative}
.editing .date-card.drop-after{box-shadow:0 2.5px 0 0 var(--cmg-primary)!important;z-index:2;position:relative}
.condensed.editing .date-card.drop-before{box-shadow:inset 0 2.5px 0 0 var(--cmg-primary)!important}
.condensed.editing .date-card.drop-after{box-shadow:inset 0 -2.5px 0 0 var(--cmg-primary)!important}

/* ── Drag: Inventory item pickup ─────────────────────── */
.inv-date-dragging{background:var(--cmg-primary-bg)!important;box-shadow:0 2px 8px rgba(0,0,0,.1);border-radius:4px}

/* ── Condensed View ───────────────────────────────────── */
.condensed .date-grid{display:flex;flex-direction:column;gap:0}
.condensed .date-card{padding:5px 10px;border-radius:0;border-left:3px solid transparent;border-bottom:1px solid var(--cmg-border-light);display:flex;align-items:center;gap:10px;flex-wrap:nowrap}
.condensed .date-card:first-child{border-top-left-radius:4px;border-top-right-radius:4px}
.condensed .date-card:last-child{border-bottom-left-radius:4px;border-bottom-right-radius:4px;border-bottom:none}
.condensed .date-card-top{flex:0 0 auto;width:180px;min-width:0}
.condensed .date-card-label{margin-bottom:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.condensed .date-card-value{font-size:12px;flex:0 0 auto;min-width:110px}
.condensed .date-card-badges{margin-top:0;flex:1;justify-content:flex-end}
.condensed .date-card-remove{display:none}
.condensed.editing .date-card-remove{display:block;order:99}
.condensed .group-content{padding:8px 10px}
/* ── View Toggle ──────────────────────────────────────── */
.view-toggle{display:inline-flex;border:1px solid var(--cmg-border);border-radius:var(--cmg-radius);overflow:hidden}
.view-toggle button{background:var(--cmg-surface);border:none;padding:5px 10px;cursor:pointer;color:var(--cmg-text-muted);font-family:inherit;font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px;transition:background .15s,color .15s}
.view-toggle button:not(:last-child){border-right:1px solid var(--cmg-border)}
.view-toggle button.active{background:var(--cmg-primary-bg);color:var(--cmg-primary-dark)}
.view-toggle button:hover:not(.active){background:var(--cmg-bg)}

/* ── Inventory Panel ───────────────────────────────────── */
.inventory{position:fixed;top:0;right:0;width:360px;height:calc(100vh - 52px);background:var(--cmg-surface);border-left:1px solid var(--cmg-border);box-shadow:-4px 0 20px rgba(0,0,0,.08);z-index:90;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease}
.inventory.open{transform:translateX(0)}
.inventory-header{padding:12px 16px;background:var(--cmg-primary);color:#fff;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.inventory-header h3{font-size:14px;font-weight:700}
.inventory-close{background:none;border:none;color:rgba(255,255,255,.8);font-size:18px;cursor:pointer;padding:2px 6px;border-radius:4px} .inventory-close:hover{color:#fff;background:rgba(255,255,255,.15)}
.inventory-search{padding:10px 16px;border-bottom:1px solid var(--cmg-border-light);flex-shrink:0}
.inventory-search input{width:100%;padding:7px 12px;border:1px solid var(--cmg-border);border-radius:var(--cmg-radius);font-family:inherit;font-size:12px;background:var(--cmg-bg);color:var(--cmg-text);outline:none}
.inventory-search input:focus{border-color:var(--cmg-primary-light);box-shadow:0 0 0 2px rgba(50,164,172,.15)}
.inventory-body{flex:1;overflow-y:auto;padding:6px 0}
.inv-cat{padding:0 16px;margin-bottom:2px}
.inv-cat-header{display:flex;align-items:center;justify-content:space-between;padding:6px 0 3px;border-bottom:1px solid var(--cmg-border-light);margin-bottom:3px;cursor:pointer}
.inv-cat-label{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.inv-cat-chevron{transition:transform .2s;color:var(--cmg-text-muted)} .inv-cat-chevron.collapsed{transform:rotate(-90deg)}
.inv-cat-content.collapsed{display:none}
.inv-date{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:4px;cursor:grab;font-size:12px;color:var(--cmg-text);transition:background .1s}
.inv-date:hover{background:var(--cmg-primary-bg)}
.inv-date:active{cursor:grabbing}
.inv-date.used{opacity:.35;cursor:default;pointer-events:none}
.inv-date .grip{color:var(--cmg-text-muted);font-size:10px;flex-shrink:0;width:14px;text-align:center}
.inv-date-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inv-date-val{flex-shrink:0;font-size:10.5px;font-weight:600;color:var(--cmg-text-muted);margin-left:auto;padding-left:6px}

/* ── Add Group Button ──────────────────────────────────── */
.add-group-btn{width:100%;padding:12px;border:2px dashed var(--cmg-border);border-radius:var(--cmg-radius);background:none;font-family:inherit;font-size:12px;font-weight:600;color:var(--cmg-primary);cursor:pointer;display:none;transition:border-color .15s,background .15s}
.add-group-btn:hover{border-color:var(--cmg-primary);background:var(--cmg-primary-bg)}
.editing .add-group-btn{display:block}

/* ── Edit Footer Bar ───────────────────────────────────── */
.edit-footer{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--cmg-primary-dark);padding:12px 20px;display:none;align-items:center;justify-content:space-between;box-shadow:0 -4px 16px rgba(0,0,0,.25)}
.edit-footer.visible{display:flex}
.edit-footer-hint{color:rgba(255,255,255,.8);font-size:12px}
.edit-footer-actions{display:flex;align-items:center;gap:8px}
.edit-footer .btn-save{background:#fff;color:var(--cmg-primary-dark);font-weight:700;padding:8px 20px;font-size:13px}
.edit-footer .btn-save:hover{background:var(--cmg-primary-bg)}
.edit-footer .btn-cancel{background:rgba(255,255,255,.15);color:#fff;padding:8px 16px}
.edit-footer .btn-cancel:hover{background:rgba(255,255,255,.25)}
.edit-footer .btn-save-as{background:rgba(255,255,255,.1);color:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.3);padding:8px 14px}
.edit-footer .btn-save-as:hover{background:rgba(255,255,255,.2)}
/* ── Save-As Bar ──────────────────────────────────────── */
.save-bar{position:fixed;bottom:0;left:0;right:0;z-index:96;background:var(--cmg-surface);border-top:1px solid var(--cmg-border);padding:10px 20px;display:none;align-items:center;justify-content:space-between;box-shadow:0 -2px 10px rgba(0,0,0,.08)}
.save-bar.visible{display:flex}
.save-bar-left{display:flex;align-items:center;gap:10px}
.save-bar-right{display:flex;align-items:center;gap:8px}
.save-name-input{padding:6px 10px;border:1px solid var(--cmg-border);border-radius:var(--cmg-radius);font-family:inherit;font-size:12px;width:200px;outline:none}
.save-name-input:focus{border-color:var(--cmg-primary-light)}
@media(max-width:768px){.edit-footer{right:0}}

/* ── Empty ─────────────────────────────────────────────── */
.empty-state{text-align:center;padding:60px 20px;color:var(--cmg-text-muted)}
.empty-state h3{font-size:16px;color:var(--cmg-text);margin-bottom:6px}
.empty-state p{font-size:13px}

/* ── Print ─────────────────────────────────────────────── */
@media print{.navbar{position:static;box-shadow:none}.controls-bar,.stats-row,.mode-banner,.inventory,.save-bar,.add-group-btn,.group-drag-handle,.group-actions,.date-card-remove{display:none!important}.group-panel{break-inside:avoid;box-shadow:none;border:1px solid #ddd}body{background:#fff}}
@media(max-width:768px){.navbar{padding:8px 12px}.loan-bar{padding:8px 12px}.main-area{padding:0 12px 16px}.date-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}.inventory{width:100vw}}

/* ── Color Picker ──────────────────────────────────────── */
.color-dots{display:flex;gap:4px}
.color-dot{width:16px;height:16px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:border-color .15s}
.color-dot:hover,.color-dot.active{border-color:var(--cmg-text)}

/* ── Date Tooltip ─────────────────────────────────────────── */
.date-tooltip{position:fixed;z-index:600;pointer-events:none;opacity:0;transform:translate(-50%,-100%) translateY(6px);transition:opacity .18s,transform .18s cubic-bezier(.16,1,.3,1)}
.date-tooltip.visible{opacity:1;transform:translate(-50%,-100%) translateY(0)}
.date-tooltip.below{transform:translate(-50%,0) translateY(-6px)}
.date-tooltip.below.visible{transform:translate(-50%,0) translateY(0)}
.date-tooltip-inner{background:linear-gradient(135deg,#1e293b,#0f172a);color:#f1f5f9;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:700;box-shadow:0 8px 32px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.06);display:flex;align-items:center;gap:8px;white-space:nowrap}
.date-tooltip-arrow{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:7px solid #1e293b}
.date-tooltip.below .date-tooltip-arrow{top:-6px;bottom:auto;border-top:none;border-bottom:7px solid #1e293b}
.tooltip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px}

/* ── Date Detail Modal ────────────────────────────────────── */
.date-modal-backdrop{position:fixed;inset:0;z-index:500;background:rgba(15,23,42,.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;perspective:1200px}
.date-modal-backdrop.open{opacity:1;pointer-events:auto}
.date-modal{background:var(--cmg-surface);border-radius:16px;box-shadow:0 25px 80px rgba(0,0,0,.25),0 0 0 1px rgba(0,0,0,.06);width:460px;max-width:92vw;overflow:hidden;position:relative;transform:rotateY(90deg) scale(.85);opacity:0;transition:transform .5s cubic-bezier(.34,1.56,.64,1),opacity .3s}
.date-modal-backdrop.open .date-modal{transform:rotateY(0) scale(1);opacity:1}
.dm-accent{height:4px;width:100%}
.dm-header{padding:24px 28px 20px;display:flex;align-items:flex-start;gap:20px;position:relative}
.dm-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--cmg-text-muted);cursor:pointer;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;transition:all .2s}
.dm-close:hover{background:var(--cmg-bg);color:var(--cmg-text);transform:rotate(90deg)}
.dm-calendar{width:80px;flex-shrink:0;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.1);border:1px solid var(--cmg-border-light)}
.dm-cal-month{padding:5px;text-align:center;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#fff}
.dm-cal-day{text-align:center;font-size:34px;font-weight:800;color:var(--cmg-text-dark);line-height:1;padding:8px 0 2px;background:var(--cmg-surface)}
.dm-cal-year{text-align:center;font-size:11px;font-weight:600;color:var(--cmg-text-muted);padding-bottom:8px;background:var(--cmg-surface)}
.dm-calendar-empty .dm-cal-day{color:var(--cmg-border);font-size:28px}
.dm-info{flex:1;min-width:0;padding-top:2px}
.dm-label{font-size:19px;font-weight:800;color:var(--cmg-text-dark);line-height:1.2;margin-bottom:6px}
.dm-formatted-date{font-size:13px;font-weight:600;color:var(--cmg-text-label);margin-bottom:10px}
.dm-relative{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700}
.dm-divider{height:1px;background:var(--cmg-border-light);margin:0 28px}
.dm-body{padding:20px 28px 24px}
.dm-description{font-size:13.5px;line-height:1.7;color:var(--cmg-text);margin-bottom:16px;padding:14px 16px;background:var(--cmg-bg-alt);border-radius:10px;border-left:3px solid var(--cmg-border)}
.dm-meta{display:flex;gap:8px;flex-wrap:wrap}
.dm-cat-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;background:var(--cmg-bg);color:var(--cmg-text-label);border:1px solid var(--cmg-border-light)}
.dm-badge{display:inline-flex;align-items:center;gap:4px;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700}
/* ── Custom Doc Edit Form (inside modal) ─────────────────── */
.dm-edit-section{margin-top:16px;padding:18px 20px;background:var(--cmg-bg-alt);border-radius:12px;border:1px solid var(--cmg-border-light)}
.dm-edit-section h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--cmg-text-muted);margin-bottom:12px}
.dm-edit-row{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.dm-edit-row:last-child{margin-bottom:0}
.dm-edit-row label{font-size:12px;font-weight:600;color:var(--cmg-text-label)}
.dm-edit-row input[type="text"],.dm-edit-row input[type="date"]{width:100%;padding:8px 12px;border:1px solid var(--cmg-border);border-radius:var(--cmg-radius);font-family:inherit;font-size:13px;color:var(--cmg-text);background:var(--cmg-surface);transition:border-color .15s}
.dm-edit-row input:focus{outline:none;border-color:var(--cmg-primary);box-shadow:0 0 0 3px rgba(19,136,144,.12)}
.dm-edit-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.dm-edit-actions .btn{min-width:80px;justify-content:center}
@media print{.date-tooltip,.date-modal-backdrop{display:none!important}}
</style>

const TODAY=new Date(); TODAY.setHours(0,0,0,0);
function pd(s){if(!s)return null;const d=new Date(s+'T00:00:00');return isNaN(d)?null:d}
function fmt(s){const d=pd(s);return d?d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'\u2014'}
function dst(s,cat){const d=pd(s);if(!d)return'pending';if(cat==='expiration'&&d<TODAY)return'expired';if(d.toDateString()===TODAY.toDateString())return'today';return d<TODAY?'completed':'upcoming'}
function stCol(st){return{completed:'#609e5b',today:'#138890',upcoming:'#d97706',expired:'#cb3a31',pending:'#ced4db'}[st]}
function daysDiff(s){const d=pd(s);if(!d)return null;return Math.ceil((d-TODAY)/(864e5))}
function gid(){return 'g-'+Date.now()+'-'+Math.random().toString(36).slice(2,6)}

function relLabel(dd){
  if(dd===null)return'Not yet set';
  if(dd===0)return'Today';if(dd===1)return'Tomorrow';if(dd===-1)return'Yesterday';
  return dd>0?'in '+dd+' day'+(dd!==1?'s':''):Math.abs(dd)+' day'+(Math.abs(dd)!==1?'s':'')+' ago';
}

function showTooltip(e,dateId){
  if(editing)return;
  const f=DF.find(d=>d.id===dateId);if(!f)return;
  const v=getDate(f.id),st=dst(v,f.c),col=stCol(st),dd=daysDiff(v);
  const tip=document.getElementById('dateTooltip');
  tip.querySelector('.tooltip-dot').style.background=col;
  tip.querySelector('.tooltip-dot').style.color=col;
  tip.querySelector('.tooltip-text').textContent=relLabel(dd);
  const rect=e.currentTarget.getBoundingClientRect();
  tip.style.left=(rect.left+rect.width/2)+'px';
  if(rect.top<60){tip.style.top=(rect.bottom+8)+'px';tip.classList.add('below')}
  else{tip.style.top=(rect.top-8)+'px';tip.classList.remove('below')}
  tip.classList.add('visible');
}

function hideTooltip(){document.getElementById('dateTooltip').classList.remove('visible','below')}

  let bg='';
  if(f.f==='c')bg+='<span class="dm-badge" style="background:#ede9fe;color:#6d28d9">\u2699 Computed</span>';
  if(f.f==='e'&&!isCustomDoc(f.id))bg+='<span class="dm-badge" style="background:var(--cmg-primary-bg);color:var(--cmg-primary-dark)">\u270E Editable</span>';
  if(f.f==='x'&&v){const dl=daysDiff(v);if(dl!==null){const urg=dl<30;bg+='<span class="dm-badge" style="background:'+(urg?'var(--cmg-red-bg)':'var(--cmg-amber-bg)')+';color:'+(urg?'var(--cmg-red)':'var(--cmg-amber)')+'">\u23F1 '+dl+'d to expiry</span>'}}

  const cp=cat?'<span class="dm-cat-pill"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+cat.color+'"></span>'+cat.label+'</span>':'';

  // Edit form for custom doc dates
  let editSection='';
  if(isCustomDoc(f.id)){
    const curLabel=(customDocs[f.id]&&customDocs[f.id].label)||'';
    const curDate=(customDocs[f.id]&&customDocs[f.id].date)||(DATES[f.id])||'';
    editSection='<div class="dm-edit-section"><h4>\u270E Customize This Date</h4>'
      +'<div class="dm-edit-row"><label for="docEditLabel">Name</label><input type="text" id="docEditLabel" value="'+curLabel.replace(/"/g,'&quot;')+'" placeholder="e.g. 1st Paystub Post-Closing"></div>'
      +'<div class="dm-edit-row"><label for="docEditDate">Due Date</label><input type="date" id="docEditDate" value="'+curDate+'"></div>'
      +'<div class="dm-edit-actions"><button class="btn btn-secondary btn-sm" onclick="clearCustomDoc(\''+f.id+'\')">Clear</button><button class="btn btn-primary btn-sm" onclick="saveCustomDoc(\''+f.id+'\')">Save</button></div></div>';
  }

  document.querySelector('.dm-accent').style.background='linear-gradient(90deg,'+cc+','+cc+'88)';
  document.querySelector('.dm-content').innerHTML='<button class="dm-close" onclick="closeDateModal()">&times;</button><div class="dm-header">'+cal+'<div class="dm-info"><div class="dm-label">'+lbl+'</div><div class="dm-formatted-date">'+(v?fmt(v):'Not yet set')+'</div>'+rel+'</div></div><div class="dm-divider"></div><div class="dm-body"><div class="dm-description">'+f.d+'</div><div class="dm-meta">'+cp+bg+'</div>'+editSection+'</div>';

  hideTooltip();
  document.getElementById('dateModalBackdrop').classList.add('open');
  // Auto-focus the label input for custom docs
  if(isCustomDoc(f.id)){const inp=document.getElementById('docEditLabel');if(inp)setTimeout(()=>inp.focus(),400)}
}

function closeDateModal(){document.getElementById('dateModalBackdrop').classList.remove('open')}

function saveCustomDoc(id){
  const label=(document.getElementById('docEditLabel').value||'').trim();
  const date=document.getElementById('docEditDate').value||null;
  customDocs[id]={label:label,date:date};

    const actions=`<div class="group-actions">${widthBtn}<div class="color-dots">${GROUP_COLORS.map(gc=>`<span class="color-dot${gc===g.color?' active':''}" style="background:${gc}" onclick="event.stopPropagation();setGroupColor('${g.id}','${gc}')"></span>`).join('')}</div><button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteGroup('${g.id}')">Delete</button></div>`;

    html+=`<div class="group-panel${spanCls}" id="gp-${g.id}" draggable="${editing}" ondragstart="onGroupDragStart(event,'${g.id}')" ondragend="onDragEnd(event)" ondragover="onGroupPanelDragOver(event,'${g.id}')" ondragleave="onGroupPanelDragLeave(event)" ondrop="onGroupPanelDrop(event,'${g.id}')">`;
    html+=`<div class="group-header" onclick="toggleGroup('${g.id}')">${grip}<span class="group-color-bar" style="background:${g.color}"></span>${nameEl}<span class="group-count">${fields.length}</span>${actions}<svg class="group-chevron${col?' collapsed':''}" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>`;

    if(!col){
      html+=`<div class="group-content${fields.length===0&&editing?' empty-target':''}" id="gc-${g.id}" ondragover="onGroupContentDragOver(event,'${g.id}')" ondragleave="onGroupContentDragLeave(event)" ondrop="onGroupContentDrop(event,'${g.id}')">`;
      if(fields.length===0&&editing){
        html+=`Drop dates here`;
      } else {
        html+=`<div class="date-grid">${fields.map(f=>renderDateCard(f,g.id,g.color)).join('')}</div>`;
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  // Final drop zone AFTER last group
  if(editing) html+=dzRow(groups.length);
  html+=`</div>`; // close groups-grid
  html+=`<button class="add-group-btn" onclick="addGroup()">+ Add Group</button>`;
  if(editing) html+=`<div style="height:60px"></div>`;
  if(editing) el.classList.add('editing'); else el.classList.remove('editing');
  if(viewMode==='condensed') el.classList.add('condensed'); else el.classList.remove('condensed');
  el.innerHTML=html;
}

function renderInventory(){
  const q=(document.getElementById('invSearch')?.value||'').toLowerCase();
  const used=new Set(usedIds());
  let html='';
  CATS.forEach(cat=>{
    const fields=DF.filter(f=>f.c===cat.id);
    const filtered=q?fields.filter(f=>getLabel(f).toLowerCase().includes(q)||f.d.toLowerCase().includes(q)):fields;
    if(!filtered.length)return;
    const col=collapsedI[cat.id];
    html+=`<div class="inv-cat"><div class="inv-cat-header" onclick="toggleInvCat('${cat.id}')"><div class="inv-cat-label"><span class="group-color-bar" style="background:${cat.color}"></span>${cat.label} (${filtered.length})</div><svg class="inv-cat-chevron${col?' collapsed':''}" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>`;
    if(!col){
      html+=`<div class="inv-cat-content">`;
      filtered.forEach(f=>{
        const isUsed=used.has(f.id);
        const v=getDate(f.id);
        const dateVal=v?`<span class="inv-date-val">${fmt(v)}</span>`:'';
        html+=`<div class="inv-date${isUsed?' used':''}" draggable="${!isUsed}" ondragstart="onInvDragStart(event,'${f.id}')" ondragend="onDragEnd(event)"><span class="grip">&#x2630;</span><span class="inv-date-name">${getLabel(f)}</span>${dateVal}</div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  document.getElementById('invBody').innerHTML=html;
}

function renderAll(){renderLoanBar();renderControls();renderStats();renderGroups();if(editing)renderInventory()}

/* ═══════════════════════════════════════════════════════════
   DRAG & DROP
   ═══════════════════════════════════════════════════════════ */

// Date drag from inventory
function onInvDragStart(e,dateId){
  dragType='date'; dragId=dateId; dragSourceGroup=null;
  e.dataTransfer.effectAllowed='copy';
  e.dataTransfer.setData('text/plain',dateId);
  e.target.classList.add('inv-date-dragging');
  const grid=document.getElementById('groupsGrid');if(grid)grid.classList.add('date-receiving');
}

// Date drag from a group (to move between groups)
function onDateDragStart(e,dateId,groupId){
  if(!editing){e.preventDefault();return}
  dragType='date'; dragId=dateId; dragSourceGroup=groupId;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',dateId);
  e.target.classList.add('dragging');
  const grid=document.getElementById('groupsGrid');if(grid)grid.classList.add('date-receiving');
  e.stopPropagation(); // don't trigger group drag
}

// Group drag
function onGroupDragStart(e,groupId){
  if(!editing){e.preventDefault();return}
  dragType='group'; dragId=groupId; dragSourceGroup=null;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',groupId);
  setTimeout(()=>{
    const el=document.getElementById('gp-'+groupId);if(el)el.classList.add('dragging');
    const grid=document.getElementById('groupsGrid');if(grid)grid.classList.add('group-dragging');
  },0);
}

// Date drag: add receiving state
function onInvDragStartVisual(){
  const grid=document.getElementById('groupsGrid');if(grid)grid.classList.add('date-receiving');
}

function onDragEnd(e){
  e.target.style.opacity='';e.target.classList.remove('dragging');
  document.querySelectorAll('.dragging,.drag-over-group,.drag-target,.active,.dz-hover,.date-target,.drop-before,.drop-after').forEach(el=>{el.classList.remove('dragging','drag-over-group','drag-target','active','dz-hover','date-target','drop-before','drop-after')});
  const grid=document.getElementById('groupsGrid');
  if(grid){grid.classList.remove('group-dragging','date-receiving')}
  dragType=null;dragId=null;dragSourceGroup=null;
}

// Drop zone handlers — half/full width targets between groups
function onDzOver(e){
  if(dragType!=='group')return;
  e.preventDefault();e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('dz-hover');
}
function onDzLeave(e){
  e.currentTarget.classList.remove('dz-hover');
}
function onDzDrop(e,position,span){
  e.preventDefault();e.currentTarget.classList.remove('dz-hover');
  if(dragType!=='group'||!dragId)return;
  const fromIdx=editGroups.findIndex(g=>g.id===dragId);
  if(fromIdx<0)return;
  const [moved]=editGroups.splice(fromIdx,1);
  moved.span=span;
  // Adjust position if the removal shifted indices
  const insertAt=position>fromIdx?position-1:position;
  editGroups.splice(insertAt,0,moved);
  renderGroups();
}

// Drop date onto group content
function onGroupContentDragOver(e,groupId){
  if(dragType!=='date'){return}
  e.preventDefault();e.dataTransfer.dropEffect=dragSourceGroup?'move':'copy';
  const el=document.getElementById('gc-'+groupId);if(el)el.classList.add('drag-target');
}
function onGroupContentDragLeave(e){
  const el=e.currentTarget;if(el)el.classList.remove('drag-target');
}
function onGroupContentDrop(e,groupId){
  e.preventDefault();
  const el=document.getElementById('gc-'+groupId);if(el)el.classList.remove('drag-target');
  if(dragType!=='date'||!dragId)return;
  const g=editGroups.find(x=>x.id===groupId);if(!g)return;
  const addedFromInv=!dragSourceGroup&&isCustomDoc(dragId)&&!customDocs[dragId];
  // Remove from source group if moving
  if(dragSourceGroup&&dragSourceGroup!==groupId){
    const sg=editGroups.find(x=>x.id===dragSourceGroup);
    if(sg) sg.ids=sg.ids.filter(id=>id!==dragId);
  }
  // Remove from current position if same group (reorder to end)
  if(g.ids.includes(dragId)) g.ids=g.ids.filter(id=>id!==dragId);
  g.ids.push(dragId);
  renderGroups();renderInventory();renderStats();
  // Auto-open edit modal when adding an unconfigured custom doc from inventory
  if(addedFromInv){const did=dragId;setTimeout(()=>{editing=false;openDateModal(did);editing=true},300)}
}

// Date card reorder — drag over individual cards for precise placement
function onDateCardDragOver(e,dateId,groupId){
  if(dragType!=='date'||dragId===dateId)return;
  e.preventDefault();e.stopPropagation();
  e.dataTransfer.dropEffect=dragSourceGroup?'move':'copy';
  // Clear previous indicators
  document.querySelectorAll('.drop-before,.drop-after').forEach(el=>el.classList.remove('drop-before','drop-after'));
  // Top half = before, bottom half = after
  const rect=e.currentTarget.getBoundingClientRect();
  const before=e.clientY<rect.top+rect.height/2;
  e.currentTarget.classList.add(before?'drop-before':'drop-after');
  // Keep group-level highlight
  const gc=document.getElementById('gc-'+groupId);if(gc)gc.classList.add('drag-target');
}
function onDateCardDragLeave(e){
  e.currentTarget.classList.remove('drop-before','drop-after');
}
function onDateCardDrop(e,targetDateId,groupId){
  e.preventDefault();e.stopPropagation();
  const rect=e.currentTarget.getBoundingClientRect();
  const before=e.clientY<rect.top+rect.height/2;
  // Clean up
  document.querySelectorAll('.drop-before,.drop-after,.drag-target').forEach(el=>el.classList.remove('drop-before','drop-after','drag-target'));
  if(dragType!=='date'||!dragId||dragId===targetDateId)return;
  const g=editGroups.find(x=>x.id===groupId);if(!g)return;
  const addedFromInv=!dragSourceGroup&&isCustomDoc(dragId)&&!customDocs[dragId];
  // Remove from source group if cross-group move
  if(dragSourceGroup&&dragSourceGroup!==groupId){
    const sg=editGroups.find(x=>x.id===dragSourceGroup);
    if(sg) sg.ids=sg.ids.filter(id=>id!==dragId);
  }
  // Remove from current position in this group (for reorder)
  if(g.ids.includes(dragId)) g.ids=g.ids.filter(id=>id!==dragId);
  // Insert at target position
  let idx=g.ids.indexOf(targetDateId);
  if(idx<0)idx=g.ids.length;
  g.ids.splice(before?idx:idx+1,0,dragId);
  renderGroups();renderInventory();renderStats();
  if(addedFromInv){const did=dragId;setTimeout(()=>{editing=false;openDateModal(did);editing=true},300)}
}

// Group reorder — drag a group over another group to swap positions
function onGroupPanelDragOver(e,targetId){
  if(dragType!=='group'||dragId===targetId)return;
  e.preventDefault();e.dataTransfer.dropEffect='move';
  const el=document.getElementById('gp-'+targetId);if(el)el.classList.add('drag-over-group');
}
function onGroupPanelDragLeave(e){
  e.currentTarget.classList.remove('drag-over-group');
}
function onGroupPanelDrop(e,targetId){
  e.preventDefault();e.currentTarget.classList.remove('drag-over-group');
  if(dragType==='date'){onGroupContentDrop(e,targetId);return} // date drop on header
  if(dragType!=='group'||!dragId||dragId===targetId)return;
  const fromIdx=editGroups.findIndex(g=>g.id===dragId);
  const toIdx=editGroups.findIndex(g=>g.id===targetId);
  if(fromIdx<0||toIdx<0)return;
  const [moved]=editGroups.splice(fromIdx,1);
  editGroups.splice(toIdx,0,moved);
  renderGroups();
}

/* ═══════════════════════════════════════════════════════════
   EDIT MODE
   ═══════════════════════════════════════════════════════════ */

function startEdit(){
  editing=true;
  editGroups=JSON.parse(JSON.stringify(active().groups));
  document.getElementById('modeBanner').classList.add('visible');
  document.getElementById('editFooter').classList.add('visible');
  document.getElementById('mainArea').classList.add('with-inventory','editing');
  document.getElementById('inventory').classList.add('open');
  renderAll();
}

function cancelEdit(){
  editing=false;
  document.getElementById('modeBanner').classList.remove('visible');
  document.getElementById('editFooter').classList.remove('visible');
  document.getElementById('saveBar').classList.remove('visible');
  document.getElementById('mainArea').classList.remove('with-inventory','editing');
  document.getElementById('inventory').classList.remove('open');
  renderAll();
}

function saveEdit(){
  const al=layouts.find(l=>l.id===activeId);
  if(al){al.groups=JSON.parse(JSON.stringify(editGroups));persist()}
  cancelEdit();
}

function closeInventory(){cancelEdit()}

function openSaveAs(){
  document.getElementById('saveBar').classList.add('visible');
  document.getElementById('editFooter').classList.remove('visible');
  const input=document.getElementById('saveNameInput');
  input.value='';input.focus();
}
function closeSaveBar(){
  document.getElementById('saveBar').classList.remove('visible');
  document.getElementById('editFooter').classList.add('visible');
}
function doSaveAs(){
  const name=(document.getElementById('saveNameInput').value||'').trim();
  if(!name){document.getElementById('saveNameInput').focus();return}
  const id='lay-'+Date.now();
  layouts.push({id,name,isDefault:false,groups:JSON.parse(JSON.stringify(editGroups))});
  activeId=id;persist();
  cancelEdit();
}

/* ═══════════════════════════════════════════════════════════
   GROUP MANAGEMENT
   ═══════════════════════════════════════════════════════════ */

function addGroup(pos){
  const name=prompt('Group name:','My Dates');
  if(!name)return;
  const color=GROUP_COLORS[editGroups.length%GROUP_COLORS.length];
  const g={id:gid(),name,color,span:1,ids:[]};
  if(pos===0) editGroups.unshift(g); else editGroups.push(g);
  renderGroups();renderInventory();
}

function renameGroup(id,name){const g=editGroups.find(x=>x.id===id);if(g)g.name=name}

function setGroupColor(id,color){
  const g=editGroups.find(x=>x.id===id);if(g){g.color=color;renderGroups()}
}

function toggleSpan(id){
  const g=editGroups.find(x=>x.id===id);
  if(g){g.span=(g.span||1)===2?1:2;renderGroups()}
}

function deleteGroup(id){
  if(!confirm('Delete this group? Dates will return to inventory.'))return;
  editGroups=editGroups.filter(g=>g.id!==id);
  renderGroups();renderInventory();renderStats();
}

function removeDate(groupId,dateId){
  const g=editGroups.find(x=>x.id===groupId);
  if(g){g.ids=g.ids.filter(id=>id!==dateId);renderGroups();renderInventory();renderStats()}
}

function toggleGroup(id){collapsedG[id]=!collapsedG[id];renderGroups()}
function toggleInvCat(id){collapsedI[id]=!collapsedI[id];renderInventory()}

/* ═══════════════════════════════════════════════════════════
   LAYOUT MANAGEMENT
   ═══════════════════════════════════════════════════════════ */

function setView(mode){viewMode=mode;localStorage.setItem('clear-dash-view',mode);renderControls();renderGroups()}
function toggleDD(){ddOpen=!ddOpen;renderControls()}
function switchLayout(id){activeId=id;ddOpen=false;persist();renderAll()}
function deleteLayout(id){if(!confirm('Delete this layout?'))return;layouts=layouts.filter(l=>l.id!==id);if(activeId===id)activeId='default';ddOpen=false;persist();renderAll()}
function createLayout(){
  const name=prompt('Layout name:','My Custom Layout');if(!name)return;
  const id='lay-'+Date.now();
  layouts.push({id,name,isDefault:false,groups:[{id:gid(),name:'My Dates',color:'#138890',ids:[...mkDefault().groups[0].ids]}]});
  activeId=id;ddOpen=false;persist();renderAll();startEdit();
}

// Close dropdown on outside click
document.addEventListener('click',e=>{if(ddOpen&&!e.target.closest('.layout-select')){ddOpen=false;renderControls()}});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(document.getElementById('dateModalBackdrop').classList.contains('open')){closeDateModal();return}if(editing)cancelEdit();ddOpen=false;renderControls()}});

/* ═══════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════ */
load();
renderAll();
</script>
